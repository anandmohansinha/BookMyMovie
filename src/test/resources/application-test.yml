spring:
  data:
    redis:
      host: localhost
      port: 6379
      repositories:
        enabled: false
  kafka:
    bootstrap-servers: localhost:9092
  datasource:
    url: jdbc:h2:mem:moviedb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  h2:
    console:
      enabled: false

app:
  seed:
    enabled: false
  integration:
    redis-lock-cache-enabled: false
    kafka-booking-events-enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    metrics:
      enabled: true
    prometheus:
      enabled: true
  tracing:
    enabled: false
