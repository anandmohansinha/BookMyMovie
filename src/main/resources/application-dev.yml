spring:
  datasource:
    url: jdbc:h2:mem:bookmymovie;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
  h2:
    console:
      enabled: true
      path: /h2-console

app:
  seed:
    enabled: true
  integration:
    redis-lock-cache-enabled: false
    kafka-booking-events-enabled: false

management:
  tracing:
    enabled: false
